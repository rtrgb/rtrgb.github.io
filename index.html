<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gabriel Buzzi | Photography</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <!-- NAVEGAÇÃO -->
    <nav>
        <div class="nav-logo">Buzzi</div>
        <ul class="nav-links">
            <li><a href="#gallery">Gallery</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- HERO (tela de entrada) -->
    <section id="hero">
        <h1>Gabriel Buzzi</h1>
        <p>Photography</p>
    </section>


    <!-- GALLERY -->
    <section id="gallery">
        <h2>Gallery</h2>

        <!-- FILTERS -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="animals">Animals</button>
            <button class="filter-btn" data-filter="nature">Nature</button>
            <button class="filter-btn" data-filter="cars">Cars</button>
            <button class="filter-btn" data-filter="sports">Sports</button>
        </div>

        <!-- GRID -->
        <div class="grid">
            <div class="photo-item" data-category="animals" data-location="Zion National Park, Utah"
                data-date="April 24th, 2026">
                <img src="images/sqr1.jpg" alt="Squirrel" />
            </div>
            <div class="photo-item" data-category="animals" data-location="Haleiwa, Hawaii"
                data-date="November 16th, 2025">
                <img src="images/t1.jpg" alt="Turtle" />
            </div>
            <div class="photo-item" data-category="animals" data-location="Miami, Florida" data-date="May 1st, 2026">
                <img src="images/c1.jpg" alt="Cat" />
            </div>
            <div class="photo-item" data-category="animals" data-location="Miami, Florida" data-date="May 1st, 2026">
                <img src="images/b1.jpg" alt="Bird" />
            </div>
        </div>
    </section>

    <!-- SOBRE -->
    <section id="about">
        <h2>About</h2>
        <p>Passionate photographer with a deep appreciation for the nature, sports, cars and travel.</p>
    </section>

    <!-- CONTATO -->
    <section id="contact">
        <h2>Contact</h2>
        <p>buzzifotografia@gmail.com</p>
    </section>

    <!-- LIGHTBOX -->
    <div id="lightbox">
        <button id="lightbox-close">&times;</button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="" />
            <div class="lightbox-info">
                <span id="lightbox-location">📍</span>
                <span id="lightbox-date"></span>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
