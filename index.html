<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gabriel Buzzi | Photography</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <!-- NAVEGAÇÃO -->
    <nav>
        <div class="nav-logo">Buzzi</div>
        <ul class="nav-links">
        <li><a href="#gallery">Gallery</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- HERO (tela de entrada) -->
    <section id="hero">
        <h1>Gabriel Buzzi</h1>
        <p>Photography</p>
    </section>

    <!-- GALERIA -->
    <section id="gallery">
        <h2>Gallery</h2>
        <div class="grid">
            <img src="images/b1.jpg" alt="Photo" />
            <img src="images/b2.jpg" alt="Photo" />
            <img src="images/c1.jpg" alt="Photo" />
            <img src="images/sqr1.jpg" alt="Photo" />
            <img src="images/t1.jpg" alt="Photo" />
        </div>
    </section>

    <!-- SOBRE -->
    <section id="about">
        <h2>About</h2>
        <p>Write here a little about you and your relationship with photography.</p>
    </section>

    <!-- CONTATO -->
    <section id="contact">
        <h2>Contact</h2>
        <p>retrogb1@gmail.com</p>
    </section>

    <!-- LIGHTBOX -->
    <div id="lightbox">
        <button id="lightbox-close">&times;</button>
        <img id="lightbox-img" src="" alt="" />
    </div>

    <script src="js/main.js"></script>
</body>

</html>
